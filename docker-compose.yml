services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - anomaly_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - anomaly_network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: anomaly_user
      POSTGRES_PASSWORD: anomaly_pass
      POSTGRES_DB: anomaly_db
    ports:
      - "5432:5432"
    networks:
      - anomaly_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anomaly_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - anomaly_network
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: sensor-producer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - anomaly_network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: sensor-data
      EMIT_INTERVAL_SECONDS: "1"
      ANOMALY_PROBABILITY: "0.05"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: anomaly_user
      DB_PASSWORD: anomaly_pass
      DB_NAME: anomaly_db
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: anomaly-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - anomaly_network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: sensor-data
      KAFKA_GROUP_ID: anomaly-detector-group
      MODEL_TYPE: "isolation_forest"
      ALERT_TOPIC: sensor-alerts
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: anomaly_user
      DB_PASSWORD: anomaly_pass
      DB_NAME: anomaly_db
    volumes:
      - ./models/saved:/app/models/saved
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: streamlit-dashboard
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    networks:
      - anomaly_network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SENSOR_TOPIC: sensor-data
      ALERT_TOPIC: sensor-alerts
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: anomaly_user
      DB_PASSWORD: anomaly_pass
      DB_NAME: anomaly_db
    restart: unless-stopped

volumes:
  kafka-data:
  postgres_data:

networks:
  anomaly_network:
    driver: bridge
